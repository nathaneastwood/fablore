name: CI
on: [push, pull_request]

jobs:
  test:
    name: Test and Check Links
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python test dependencies
      run: pip install -r requirements-dev.txt

    - name: Install mdbook
      run: |
        mkdir -p ~/.local/bin
        curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.5.3/mdbook-v0.5.3-x86_64-unknown-linux-gnu.tar.gz \
          | tar -xz -C ~/.local/bin
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Run Python data pipeline tests
      run: python -m pytest

    - name: Build the book
      run: mdbook build

    - name: Run lychee on book output
      uses: lycheeverse/lychee-action@v2
      with:
        args: --config lychee.toml --root-dir ${{ github.workspace }}/book ./book
        fail: true
