name: CI
on: [push, pull_request]

jobs:
  test:
    name: Test and Check Links
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python test dependencies
      run: pip install -r requirements-dev.txt

    - name: Install mdbook
      run: |
        curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.5.3/mdbook-v0.5.3-x86_64-unknown-linux-gnu.tar.gz \
          | tar -xz -C ~/.local/bin

    - name: Run Python data pipeline tests
      run: python -m pytest

    - name: Install Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2.0

    - name: Install Ruby gems (via bundler)
      run: |
        gem install bundler
        bundle install --jobs 4 --retry 3

    - name: Build the book
      run: mdbook build

    - name: Run htmlproofer on book output
      run: |
        bundle exec htmlproofer ./book \
          --assume-extension \
          --check-html \
          --disable-external \
          --only-4xx \
          --ignore-missing-alt \
          --ignore-files "./book/toc.html,./book/404.html"
