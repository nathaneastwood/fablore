[book]
authors = ["nathaneastwood"]
language = "en"
src = "src"
title = "Legendary Stories"
description = "Community-curated archive of official Flesh and Blood lore — explore Rathe through stories and characters."

[output.html]
additional-css = ["hero.css", "image.css", "tab.css", "bionic.css", "footer.css", "breadcrumb.css", "sets-hub.css", "theme/pagetoc.css", "theme/hints.css", "theme/related.css", "theme/story-meta.css", "theme/narrated-videos.css", "theme/browse.css"]
additional-js = ["theme/toolbar.js", "tab.js", "back-to-top.js", "hero-hub.js", "bionic.js", "theme/pagetoc.js", "theme/hints.js", "theme/related.js", "narrated-videos.js", "theme/browse.js", "theme/hero-filter.js", "theme/reading-progress.js", "theme/heading-anchors.js", "theme/copy-link.js", "theme/reading-prefs.js", "theme/random-story.js", "theme/read-tracking.js"]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/nathaneastwood/fablore"
git-repository-icon = "fab-github"
cname = "legendarystories.net"

[output.html.fold]
enable = true
level = 0

[preprocessor.archive-notice]
command = "python3 src/data/mdbook_archive_notice.py"

[preprocessor.browse]
command = "python3 src/data/mdbook_browse.py"

[preprocessor.hints]
command = "python3 src/data/mdbook_hints.py"

[preprocessor.related]
command = "python3 src/data/mdbook_related.py"

[preprocessor.story-meta]
command = "python3 src/data/mdbook_story_meta.py"

[preprocessor.hero-traits]
command = "python3 src/data/mdbook_hero_traits.py"

[preprocessor.hero-meta]
command = "python3 src/data/mdbook_hero_meta.py"

[preprocessor.set-meta]
command = "python3 src/data/mdbook_set_meta.py"

[preprocessor.narrated-videos]
command = "python3 src/data/mdbook_narrated_videos.py"

[preprocessor.breadcrumb]
command = "python3 src/data/mdbook_breadcrumb.py"
after = ["set-meta"]

[preprocessor.set-index]
command = "python3 src/data/mdbook_set_index.py"

[preprocessor.sets-hub]
command = "python3 src/data/mdbook_sets_hub.py"

