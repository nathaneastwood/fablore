[book]
authors = ["nathaneastwood"]
language = "en"
src = "src"
title = "Legendary Stories"
description = "Community-curated archive of official Flesh and Blood lore — explore Rathe through stories and characters."

[languages]
en = "./en"
es = "./es"

[output.html]
additional-css = ["hero.css", "image.css", "tab.css", "bionic.css", "footer.css", "breadcrumb.css", "sets-hub.css", "theme/pagetoc.css", "theme/hints.css", "theme/related.css", "theme/story-meta.css", "theme/narrated-videos.css", "theme/browse.css", "theme/archive-notice.css"]
additional-js = ["tab.js", "back-to-top.js", "hero-hub.js", "bionic.js", "theme/pagetoc.js", "theme/hints.js", "theme/related.js", "narrated-videos.js", "theme/browse.js"]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/nathaneastwood/fablore"
git-repository-icon = "fa-github"
cname = "legendarystories.net"
sidebar = true

[output.html.fold]
enable = true
level = 0

[preprocessor.archive-notice]
command = "python3 src/data/mdbook_archive_notice.py"

[preprocessor.browse]
command = "python3 src/data/mdbook_browse.py"

[preprocessor.hints]

[preprocessor.related]
command = "python3 src/data/mdbook_related.py"

[preprocessor.story-meta]
command = "python3 src/data/mdbook_story_meta.py"

[preprocessor.hero-meta]
command = "python3 src/data/mdbook_hero_meta.py"

[preprocessor.narrated-videos]
command = "python3 src/data/mdbook_narrated_videos.py"

[preprocessor.breadcrumb]
command = "python3 src/data/mdbook_breadcrumb.py"

[preprocessor.set-index]
command = "python3 src/data/mdbook_set_index.py"

[preprocessor.sets-hub]
command = "python3 src/data/mdbook_sets_hub.py"
