[book]
authors = ["nathaneastwood"]
language = "en"
src = "src"
title = "Legendary Stories"
description = "Community-curated archive of official Flesh and Blood lore — explore Rathe through stories and characters."

[languages]
en = "./en"
es = "./es"

[output.html]
additional-css = ["hero.css", "image.css", "tab.css", "theme/pagetoc.css", "theme/hints.css", "theme/related.css", "theme/story-meta.css"]
additional-js = ["tab.js", "back-to-top.js", "hero-hub.js", "theme/pagetoc.js", "theme/hints.js", "theme/related.js"]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/nathaneastwood/fablore"
git-repository-icon = "fa-github"
cname = "legendarystories.net"
sidebar = true

[output.html.fold]
enable = true
level = 0

[preprocessor.hints]

[preprocessor.related]
command = "python3 src/data/mdbook_related.py"

[preprocessor.story-meta]
command = "python3 src/data/mdbook_story_meta.py"
